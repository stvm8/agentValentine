  /item-availability:
    post:
      tags:
        - JET Connect for Manage Product Catalogue
        - jet-connect
        - publicly-accessible
      summary: Update the availability of menu items
      description: |-
        The Item Availability API allows you to manage which items on a menu are available for ordering via your delivery partner (Just Eat, Skip The Dishes, Menulog or Takeaway).

        Menu items are marked as available or unavailable via requests to the Update Item Availability endpoint described below.

        # Features

        - Static endpoints for updating Item Availability. These endpoints do not include brand and location references in the endpoint URL, making it easier for operations teams to onboard new restaurants.
        - The ability to update multiple menu item availabilities in a single request.
        - Coming soon: more detailed error messages, including whether the operation failed when attempting to publish your update to the delivery partner (Just Eat, Skip The Dishes or Menulog).

        # Response

        If the menu and PLU references are valid and the request was accepted, you will receive a 202 Accepted response. The specified menu item should appear as available or unavailable on the delivery partner website (e.g. Just Eat, Skip The Dishes, Takeaway) automatically within less than 5 minutes.
      operationId: ItemAvailability
      security:
        - X-Flyt-Api-Key: []
      parameters:
        - $ref: "#/paths/~1menus/post/parameters/0"
        - name: x-jet-application
          in: header
          schema:
            type: string
          required: false
          description: Descriptor of client or internal application
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JetConnectMenusUtfConnectorItemAvailability"
            examples:
              Marking an item available:
                value:
                  event: AVAILABLE
                  itemReferences:
                    - 1234-3324332-23423-234
                    - 5678-5566778-87658-576
                  restaurant: "8282340"
                  happenedAt: 2018-10-11T14:56:18.234284+01:00
              Marking an item unavailable:
                value:
                  event: UNAVAILABLE
                  itemReferences:
                    - string
                  restaurant: string
                  happenedAt: 2018-10-11T14:56:18.234284+01:00
                  nextAvailableAt: 2018-10-11T14:56:18.234284+01:00
      responses:
        "202":
          description: Item Availability updates accepted for processing by upstream services
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JetConnectMenusUtfConnectorAcceptedResponse"
        "400":
          $ref: "#/components/responses/JetConnectMenusUtfConnectorBadRequestResponse"
        "403":
          $ref: "#/components/responses/JetConnectMenusUtfConnectorForbiddenResponse"
        "429":
          description: "Too Many Requests : Request not completed as server has received too many requests in a given amount of time."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4XxErrorSchema"
              example:
                fault:
                  traceId: 0HLOCKDKQPKIU
                  faultId: 72d7036d-990a-4f84-9efa-ef5f40f6044b
                  errors:
                    - description: Couldn't complete request
        "500":
          $ref: "#/components/responses/JetConnectMenusUtfConnectorServerErrorResponse"
