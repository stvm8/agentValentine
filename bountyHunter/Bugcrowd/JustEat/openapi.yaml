            $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorFailedModificationReason"
        type:
          type: string
          description: Indicates if the callback is for a modification failure.
          enum:
            - failure
    JetConnectOrderingUniversalConnectorFailedModificationBodySync:
      type: object
