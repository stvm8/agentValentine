          minimum: 1
        name:
          type: string
          format: varchar100
          description: Name of the item.
          nullable: false
          minimum: 1
        quantity:
          type: number
          format: int32
          description: Number of this item to be included in the delivery.
          nullable: false
          minimum: 1
