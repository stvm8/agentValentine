components:
  schemas:
    4XxErrorSchema:
      description: A HTTP 4xx error response
      properties:
        fault:
          required:
            - faultId
          description: Details of the fault.
          properties:
            traceId:
              description: A value that helps identify the trace back to logs, so that we can easily find what was happening on our system when the fault was generated
              type: string
            faultId:
              description: A value that helps identify this response back to logs, so we can easily find this specific fault
              type: string
            errors:
              items:
                properties:
                  description:
                    description: Specific details about the error that may assist you in resolving the issue
                    type: string
                  errorCode:
                    description: A code that identifies the problem type. It will be supported by human-readable documentation that identifies how to resolve the error
                    type: string
                type: object
              type: array
          type: object
      type: object
      example:
        fault:
          traceId: H3TKh4QSJUSwVBCBqEtkKw==
          faultId: 25bbe062-c53d-4fbc-9d6c-3df6127b94fd
          errors:
            - description: An error has occured because of an issue in the request
              errorCode: ERR401-ERR401
    500ErrorSchema:
      description: A HTTP 500 error response
      properties:
        fault:
          description: Details of the fault.
          required:
            - faultId
          properties:
            traceId:
              description: A value that helps identify the trace back to logs, so that we can easily find what was happening on our system when the fault was generated
              type: string
            faultId:
              description: A value that helps identify this response back to logs, so we can easily find this specific fault
              type: string
            errors:
              items:
                properties:
                  description:
                    description: If returned, the only value returned will be Internal Server Error"
                    enum:
                      - Internal Server Error
                    type: string
                type: object
              type: array
          type: object
      type: object
    5XxErrorSchema:
      description: A HTTP 5xx error response
      properties:
        fault:
          required:
            - faultId
          description: An object representing the nature of the failure.
          properties:
            traceId:
              description: A value that helps identify the trace back to logs, so that we can easily find what was happening on our system when the fault was generated
              type: string
            faultId:
              description: A value that helps identify this response back to logs, so we can easily find this specific fault
              type: string
            errors:
              items:
                properties:
                  description:
                    description: Specific details about the error that may assist you in resolving the issue
                    type: string
                  errorCode:
                    description: A code that identifies the problem type. It will be supported by human-readable documentation that identifies how to resolve the error
                    type: string
                type: object
              description: The list of errors.
              type: array
          type: object
      type: object
    DaasDaaSAssistanceRequest:
      type: object
      description: The assistance request object.
      required:
        - requestId
        - collect
        - reason
      properties:
        requestId:
          type: string
          description: The ID of the request. This is generated from the [Estimate delivery](#tag/Delivery-as-a-Service/paths/~1delivery~1estimate/post) endpoint
          nullable: false
        collect:
          description: Collect point used to identify the pick-up address. Represents a restaurant, a grocery store, or any other collect point. The available collect points can be retrieved using the [Get Collect Points](#tag/Delivery-as-a-Service/paths/~1delivery~1collect-points/get) endpoint.
          nullable: false
          type: object
          required:
            - id
          properties:
            id:
              type: string
              description: The collect point Id.
              nullable: false
        reason:
          enum:
            - COLLECTION_TIME_UPDATE
            - REPORT_COURIER_DELAY
            - REPORT_BAD_COURIER_BEHAVIOUR
            - OTHER_CUSTOMER_CONCERNS
            - SPECIAL_INSTRUCTIONS_INQUIRY
            - OTHER_ORDER_ISSUES
          type: string
          description: Reason used to identify the reason for which a partner needs help.
          nullable: false
      example:
        requestId: 9f84ce96-69e4-4122-8250-b17c0e92dd25
        collect:
          id: efeb46ce-53eb-44cd-afba-ba59e7b84a57
        reason: COLLECTION_TIME_UPDATE
    DaasDaaSAssistanceRequestResponse:
      type: object
      description: Request for help response.
      properties:
        requestId:
          type: string
          description: Unique Id used to identify the request.
          nullable: false
        message:
          type: string
          description: The message related to the processing of the assistance request.
          nullable: false
      example:
        requestId: 9f84ce96-69e4-4122-8250-b17c0e92dd25
        message: Request for Assistance successfully processed, please expect a Skip Agent to reach out to you.
    DaasDaaSBarcode:
      type: object
      description: Details about the type of Barcode provider.
      properties:
        type:
          description: Type of barcode provider. Currently, only partner provided barcode is supported. Note -- this is currently not supported for the following markets [BE, BG, DK, IT, NL, PL, ES, CH].
          nullable: false
          enum:
            - PARTNER_PROVIDED
    DaasDaaSCancelDeliveryRequest:
      type: object
      description: The cancel delivery object.
      required:
        - requestId
      properties:
        requestId:
          type: string
          description: The ID of the request. This is generated from the [Estimate delivery](#tag/Delivery-as-a-Service/paths/~1delivery~1estimate/post) endpoint
          nullable: false
      example:
        requestId: 9f84ce96-69e4-4122-8250-b17c0e92dd25
    DaasDaaSCancelDeliveryResponse:
      type: object
      description: The order cancellation response.
      properties:
        requestId:
          type: string
          description: Unique Id used to identify the request.
          nullable: false
        message:
          type: string
          description: The message related to the processing of the cancellation request.
          nullable: false
