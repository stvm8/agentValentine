  /restaurants/{restaurantReference}/servicetimes:
    put:
      tags:
        - JET Connect for Manage Partner Availability
        - jet-connect
        - publicly-accessible
      summary: Updates restaurant's opening times
      description: |-
        Update the service times in your Just Eat / Menulog restaurants, overriding the ones currently present on the restaurant.

        Note: This feature is currently only available for integrations in UK, IE, ES, IT, AUS.

        ## When to use it

        By availabilities on the menu, we mean what times you can order from a specific menu.
        By service times, we mean restaurant opening hours.

        It is possible to push the same menu to multiple locations however, this means that all the restaurants need to share the same availabilities on the menu.

        By using this endpoint you can “override” the service times for a given restaurant, so you will be able to push a single menu and then individually select the service times.

        <span style="color: #FFA500; font-weight: bold; font-size: 1.3em;">Limitations</span>

        The desired restaurant service hours and the actual hours might differ for a restaurant. The times are calculated by the smallest intersection of 3 different time frames.
        - **Restaurant service times**: Set through this endpoint separately for _delivery_ and _collection_.
        - **Menu availability hours**
        - **Delivery pool hours**: Set by our delivery partners.

        Therefore, you cannot override the service hours using this endpoint alone. The actual service hours also depend on the menu availability and the delivery pool hours.

        ### Scenario 1

        You push 1 unique menu with availabilities `17:00-21:00` to ten locations.

        Since one of the locations closes earlier at `20:00` you can now use the service times endpoint to update the opening hours for this location.

        ### Scenario 2

        The breakfast menu runs from `09:00-11:00`  but the restaurant needs to close at `10:00` due to driver shortage. You can use the service times endpoint to update opening hours.

        ### Scenario 3

        Menu availabilities are `8:00-12:00`. The restaurant decides on the day they want to open earlier at `07:00`. The service times endpoint cannot be used to update opening hours as you won't be able to place an order at `07:00` since there is no menu for that time.
        Instead, you would need to re-push the menu with revised availabilities `07:00-12:00`.

        ### Scenario 4 - Overlap

         Menu availabilities are `8:00-12:00`. The restaurant set the delivery opening hours to `7:30-11:30` using the service times endpoint. Therefore, the actual operating hours for the restaurant will be from `8:00-11:30`, which is the overlap between the menu availability and the service times.
      operationId: PutServiceTimes
      security:
        - X-Flyt-Api-Key: []
      parameters:
        - $ref: "#/paths/~1restaurants~1%7BrestaurantReference%7D~1online/put/parameters/0"
        - $ref: "#/paths/~1restaurants~1%7BrestaurantReference%7D~1offline/put/parameters/1"
        - name: x-jet-application
          in: header
          schema:
            type: string
          required: false
          description: Descriptor of client or internal application
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JetConnectRestaurantAvailabilityApiServiceTimes"
            examples:
              example:
                value:
                  timezone: Europe/London
                  serviceTimes:
                    - serviceType: Delivery
                      openingTimes:
                        monday:
                          - openingTime: 10:00
                            closingTime: 18:00
                          - openingTime: 20:00
                            closingTime: 23:00
                        tuesday:
                          - openingTime: 10:00
                            closingTime: 18:00
                        wednesday:
                          - openingTime: 10:00
                            closingTime: 18:00
                        thursday:
                          - openingTime: 10:00
                            closingTime: 18:00
                        friday:
                          - openingTime: 10:00
                            closingTime: 18:00
                        saturday:
                          - openingTime: 10:00
                            closingTime: 18:00
                        sunday:
                          - openingTime: 10:00
                            closingTime: 18:00
                    - serviceType: Collection
                      openingTimes:
                        monday:
                          - openingTime: 10:00
                            closingTime: 18:00
      responses:
        "202":
          description: Service Time updates accepted for processing by upstream services
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JetConnectRestaurantAvailabilityApiAcceptedResponse"
        "400":
          $ref: "#/components/responses/JetConnectRestaurantAvailabilityApiBadRequestResponse"
        "403":
          $ref: "#/components/responses/JetConnectRestaurantAvailabilityApiForbiddenResponse"
        "404":
          $ref: "#/components/responses/JetConnectRestaurantAvailabilityApiNotFoundResponse"
        "429":
          description: "Too Many Requests : Request not completed as server has received too many requests in a given amount of time."
          content:
