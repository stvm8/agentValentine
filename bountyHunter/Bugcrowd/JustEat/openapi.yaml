      x-status: Stable
  /delivery/pools/{deliveryPoolId}/change-risk:
    post:
      tags:
        - Logistic Management
        - Manage Delivery Suppliers
        - publicly-accessible
      summary: Update delivery pool risk signal
      description: Define the delivery pool risk level, in order for Demand Shaping to generate dynamic delivery area polygons for all restaurants in the delivery pool
      operationId: deliveryPoolsDeliveryPoolIdChangeRiskPost
      parameters:
        - required: true
          description: Identifier for the pool
          name: deliveryPoolId
          schema:
            type: string
          in: path
        - name: x-jet-application
          in: header
          schema:
            type: string
          required: false
          description: Descriptor of client or internal application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryPoolUpdateDeliveryPoolRisk"
      responses:
        "202":
          description: Accepted
        "400":
          description: There was something invalid in your request - check response body for details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4XxErrorSchema"
              example:
                traceId: c2FkZmFzZmFzZmhramFmams=
                faultId: 72d7036d-990a-4f84-9efa-ef5f40f6044b
