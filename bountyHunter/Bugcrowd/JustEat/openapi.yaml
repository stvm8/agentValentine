        - url: https://api.flytplatform.com
          description: The Flyt Platform (Flyt is now JET Connect)
      x-component-name: menusutfconnector
      x-status: Stable
  /menus:
    post:
      tags:
        - JET Connect for Manage Product Catalogue
        - jet-connect
        - publicly-accessible
      summary: Ingest menu from POS
      description: |-
        Use this endpoint to ingest menu(s), creating a baseline per menu received.

        # How it works

        The JET Connect Platform API allows anyone with a Just Eat, Skip The Dishes, Menulog or Takeaway account to automatically publish menus from their POS to the respective delivery partner. For this to work, client applications need to:

        1. Extract menu data from their POS
        2. Use this data to create an HTTP request in `JSON` format (see format details below)
        3. Send the request to the menu API endpoint: `https://api.flytplatform.com/menus`

        The API endpoint will validate the incoming request and, if checks are successful, publish the new menu to the delivery partner. We recommend checking the delivery partner page to see if the new menu has been updated as intended.

        # Features

        - Static endpoints for publishing menus. These endpoints do not include brand and location references in the endpoint URL, making it easier for operations teams to onboard new restaurants.
        - Ability to update menus for multiple restaurants using a single request.

        # Response Format

        If the menus are valid and the request was accepted, you will receive a `202 Accepted` response. The new menu should appear on the delivery partner website (e.g. Just Eat, Skip The Dishes, Takeaway) website automatically within less than 5 minutes.

        Note: currently, our platform only checks if the menu structure is valid. However, a valid menu may still fail to publish on the corresponding delivery partner platform. Currently, this endpoint does not indicate whether the publish operation was successful, however this is an item on our future roadmap

        # Asynchronous Callbacks

        If a valid callback address has been specified, shortly after the synchronous response indicating initial acceptance or rejection of the menu, a POST request will be made to the address detailing the eventual menu state.

        See the callback object for more details.

        ## Nutrition and Servings in menus - Under Development

        **Please note that it is mandatory in the UK to have nutritional information for brands/restaurant groups with over 250 employees ([UK government guidance](https://www.gov.uk/government/publications/calorie-labelling-in-the-out-of-home-sector/calorie-labelling-in-the-out-of-home-sector-implementation-guidance#displaying-calorie-information) link).**

        See sample payload "Menu with nutrition and servings".

        ## Translations - Under Development

        We will be beginning support for menu translations shortly, to any platform which supports it.

        This section will contain further information on supported platforms in the future.
      operationId: menusPost
      security:
        - X-Flyt-Api-Key: []
      callbacks:
        myEvent:
          "{$request.body#/callback_url}":
            post:
              description: |-
                # Asynchronous Callbacks

                If a valid callback address has been specified, shortly after the synchronous response indicating initial acceptance or rejection of the menu, a POST request will be made to the address detailing the eventual menu state.

                As a single address is defined for a collection of menus which may be associated with multiple restaurants, a separate request will be made to the address for each restaurant.
              requestBody:
                content:
                  application/json:
                    schema:
                      type: object
                      required:
                        - restaurant
                        - ingestion_succeeded
                      properties:
                        restaurant:
                          $ref: "#/components/schemas/JetConnectMenusUtfConnectorRestaurantId"
                        error:
                          description: Object detailing the error, will be omitted if ingestion has succeeded
                          type: object
                          required:
                            - code
                            - message
                          properties:
                            code:
                              description: A categorisation of the failure
                              type: string
                              pattern: ^(ERROR_UNKNOWN|CONNECTION_FAILED|INVALID_FORMAT|INVALID_CONFIGURATION)$
                            message:
                              description: The reason for the error
                              type: string
                        ingestion_succeeded:
                          description: Indicates whether the menu has been successfully accepted by the delivery partner
                          type: boolean
                      example:
                        restaurant: "1234"
                        error:
                          code: INVALID_FORMAT
                          message: example error message
                        ingestion_succeeded: true
              responses:
                "200":
                  description: OK
      parameters:
        - name: Content-Type
          in: header
          description: Specifies the content type of your request. Should always be set to application/json.
          schema:
            type: string
            pattern: ^application\/json$
        - name: x-jet-application
          in: header
          schema:
            type: string
          required: false
          description: Descriptor of client or internal application
      requestBody:
