      description: |-
        Describes the opening times of a restaurant for every day of the week.

        NOTE: At least one day needs to be specified. If a day is omitted, the restaurant is considered closed for that day of the week.
      type: object
      properties:
        monday:
          type: array
          items:
            $ref: "#/components/schemas/JetConnectRestaurantAvailabilityApiOpeningTimesDay"
        tuesday:
          type: array
          items:
            $ref: "#/components/schemas/JetConnectRestaurantAvailabilityApiOpeningTimesDay"
        wednesday:
          type: array
          items:
            $ref: "#/components/schemas/JetConnectRestaurantAvailabilityApiOpeningTimesDay"
        thursday:
          type: array
          items:
            $ref: "#/components/schemas/JetConnectRestaurantAvailabilityApiOpeningTimesDay"
        friday:
          type: array
          items:
            $ref: "#/components/schemas/JetConnectRestaurantAvailabilityApiOpeningTimesDay"
        saturday:
          type: array
          items:
            $ref: "#/components/schemas/JetConnectRestaurantAvailabilityApiOpeningTimesDay"
        sunday:
          type: array
          items:
            $ref: "#/components/schemas/JetConnectRestaurantAvailabilityApiOpeningTimesDay"
    JetConnectRestaurantAvailabilityApiOpeningTimesDay:
      description: Describes the start and end time of opening hours.
      type: object
      required:
        - openingTime
        - closingTime
      properties:
        openingTime:
          description: Opening time for the specified day, in the `hh:mm` format
          type: string
          pattern: ^\d{2}:\d{2}$
          example: 10:00
        closingTime:
          description: Closing time for the specified day, in the `hh:mm` format
          type: string
          pattern: ^\d{2}:\d{2}$
          example: 18:00
    JetConnectRestaurantAvailabilityApiRestaurantOffline:
      description: Instructs when the restaurant should be automatically put back online. If a value is not provided (or it is omitted entirely), the restaurant will remain offline indefinitely.
      type: object
      properties:
        onlineAt:
          description: Local ISO8601 formatted timestamp (without timezone) representing the local time of the restaurant indicating when the restaurant should be brought back online. If omitted, offline will be indefinite.
          type: string
          example: 2021-10-13T12:03:00
    JetConnectRestaurantAvailabilityApiServiceTime:
      description: Describes the opening times for the stated service type.
      type: object
      required:
        - serviceType
        - openingTimes
      properties:
        serviceType:
          description: Either Delivery or Collection
          type: string
          pattern: ^(Delivery|Collection)$
          example: Delivery
        openingTimes:
          $ref: "#/components/schemas/JetConnectRestaurantAvailabilityApiOpeningTimes"
    JetConnectRestaurantAvailabilityApiServiceTimes:
      description: Defines the times a restaurant provides a particular service.
      type: object
      required:
        - timezone
        - serviceTimes
      properties:
        timezone:
          description: The restaurant timezone
          type: string
          example: Europe/London
        serviceTimes:
          type: array
          items:
            $ref: "#/components/schemas/JetConnectRestaurantAvailabilityApiServiceTime"
    LogisticsLocation:
      required:
        - Latitude
        - Longitude
      type: object
      description: GeoLocation object containing latitude and longitude values.
      example:
        Speed: 8.68
        Latitude: 51.51641
        Heading: 357.10382
        Accuracy: 12.814
        Longitude: -0.103198
      properties:
        Speed:
          description: This should represent the travel speed of the driver.
          format: double
          type: number
        Latitude:
          description: This should represent the latitude of the driver's location.
          format: double
          type: number
        Heading:
          description: This should represent the degree of heading direction, for example, 0 is north, 90 is east.
          format: double
          type: number
        Accuracy:
          description: This should represent the accuracy of driver's location.
          format: double
          type: number
        Longitude:
          description: This should represent the longitude of the driver's location.
          format: double
          type: number
    OrderDeliveryEtaEstimate:
      required:
        - driverId
      properties:
        bestGuess:
          description: This should represent the delivery partner's best guess at when the driver will arrive at the restaurant.
          format: date-time
          type: string
        estimatedAt:
          description: This is the time at which you are doing the estimation
          format: date-time
          type: string
        driverId:
          description: The driver identifier
          example: "123456"
          type: string
      type: object
    PagingPagedCursorResponse:
      type: object
      description: Cursor Paging information
      properties:
        paging:
          description: Consists of pagination information.
          properties:
            cursors:
              description: Consists of cursors markers used in pagination.
              properties:
                before:
                  description: Cursor parameter to use in the next request to the resource to fetch the previous page of data.
                  type: string
                after:
                  description: Cursor parameter to use in the next request to the resource to fetch the next page of data.
                  type: string
              type: object
          type: object
      example:
        paging:
          cursors:
            before: KHt67IUVSDJDVLa
            after: NDMyNzQyODI3OTQw
    RestaurantsIgnoredRestaurantIds:
      properties:
        ignoredRestaurantIds:
          items:
            type: string
          description: A list of restaurant ids that were present in a request but were ignored.
          type: array
      type: object
      example:
        ignoredRestaurantIds:
          - "123"
          - "456"
    RestaurantsRestaurantEtAs:
      items:
        properties:
          etaAtRestaurant:
            format: int32
            description: Your best estimation in minutes
            type: number
          restaurantId:
            description: The unique identifier of the restaurant.
            type: string
        type: object
        example:
          etaAtRestaurant: 1
          restaurantId: "1"
      type: array
    RestaurantsWebhooksOrderTimeUpdated:
      type: object
      properties:
        upperBoundMinutes:
          description: Order time upper bound value, in minutes.
          format: int32
          type: integer
        serviceType:
          format: enum
          description: Service type of the order time.
          enum:
            - Delivery
            - Collection
          type: string
        dayOfWeek:
          format: enum
          description: The day of the week that has been updated.
          enum:
            - Sunday
            - Monday
            - Tuesday
            - Wednesday
            - Thursday
            - Friday
            - Saturday
          type: string
        lowerBoundMinutes:
          description: Order time lower bound value, in minutes.
          format: int32
          type: integer
        restaurantId:
          description: The Just Eat restaurant ID
          type: string
      example:
        upperBoundMinutes: 50
        serviceType: Delivery
        dayOfWeek: Monday
        lowerBoundMinutes: 35
        restaurantId: "123456"
    SharedGeoJsonPoint:
      description: The coordinates of a geographical location.
      required:
        - coordinates
        - type
      properties:
        coordinates:
          maxItems: 2
          minItems: 2
          type: array
          items:
            format: decimal
            type: number
          description: The only two elements are latitude and longitude precisely in that order and using decimal numbers.
        type:
          description: The type of geospatial data this represents. The only supported value is 'Point' in GeoJSON format as defined in [RFC 7946](https://tools.ietf.org/html/rfc7946).
          enum:
            - point
          type: string
      type: object
      example:
        coordinates:
          - 51.501285
          - -0.142442
        type: point
    StorefrontAdditive:
      type: object
      description: A single additive data point, including its type, source, verification status, and any associated warnings.
      nullable: true
      required:
        - type
        - verified
      properties:
        type:
          type: string
          description: The type of additive.
          example: caffeine
        dataSource:
          description: The source of the allergen data.
          $ref: "#/components/schemas/StorefrontDataSource"
        verified:
          type: boolean
          description: Whether the additive data has been verified.
        warnings:
          type: array
          description: An array of warnings associated with this additive.
          items:
            $ref: "#/components/schemas/StorefrontDescriptor"
    StorefrontAdditiveAttribute:
      type: object
      description: Adds additive-specific data to the base attribute.
      required:
        - additive
      properties:
        additive:
          $ref: "#/components/schemas/StorefrontAdditive"
    StorefrontAgeData:
      type: object
      description: The age-specific restriction data.
      required:
        - minAge
      properties:
        minAge:
          type: number
          format: integer
          description: The minimum purchase age value.
    StorefrontAgeRestriction:
      type: object
      description: Adds age-specific data to the base restriction.
      required:
        - age
      properties:
        age:
          $ref: "#/components/schemas/StorefrontAgeData"
    StorefrontAllergen:
      type: object
      nullable: true
      description: A single allergen data point.
      required:
        - level
        - type
        - verified
      properties:
        dataSource:
          description: The source of the allergen data.
          $ref: "#/components/schemas/StorefrontDataSource"
        verified:
          type: boolean
          description: Whether the allergen data has been verified
        level:
          type: string
          description: The containment level; contains or mayContain.
          example: contains
          enum:
            - contains
            - mayContain
        type:
          type: string
          description: The type of allergen.
          example: peanut
        subTypes:
          type: array
          description: An array of allergen sub types, may be empty.
          items:
            $ref: "#/components/schemas/StorefrontDescriptor"
    StorefrontAllergenAttribute:
      type: object
      description: Adds allergen-specific data to the base attribute.
      required:
        - allergen
      properties:
        allergen:
          $ref: "#/components/schemas/StorefrontAllergen"
    StorefrontAttribute:
      type: object
      description: A single, structured product attribute.
      required:
        - key
        - dataType
        - display
      properties:
        key:
          type: string
          description: A stable, machine-readable key for the attribute.
          example: energy
        dataType:
          type: string
          description: The discriminator, defining the structure of the data payload.
          example: measurement
        display:
          $ref: "#/components/schemas/StorefrontDisplay"
      oneOf:
        - $ref: "#/components/schemas/StorefrontMeasurementAttribute"
        - $ref: "#/components/schemas/StorefrontAllergenAttribute"
        - $ref: "#/components/schemas/StorefrontAdditiveAttribute"
        - $ref: "#/components/schemas/StorefrontFinancialAttribute"
      discriminator:
        propertyName: dataType
        mapping:
          measurement: "#/components/schemas/StorefrontMeasurementAttribute"
          allergen: "#/components/schemas/StorefrontAllergenAttribute"
          additive: "#/components/schemas/StorefrontAdditiveAttribute"
          financial: "#/components/schemas/StorefrontFinancialAttribute"
    StorefrontCatalogCategory:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - serviceType
      properties:
        id:
          description: A unique identifier for category.
          type: string
        name:
          description: The name of the category.
          type: string
        description:
          description: The description of the category.
          type: string
          nullable: true
        serviceType:
          enum:
            - delivery
            - collection
          description: Type of service (collection or delivery)
        images:
          description: Array of category image references.
          type: array
          items:
            $ref: "#/components/schemas/StorefrontImage"
        _links:
          $ref: "#/components/schemas/StorefrontCatalogCategoryLinks"
    StorefrontCatalogCategoryLinks:
      type: object
      description: Hypermedia links related to the catalog node. This will be null for a top-level category.
      additionalProperties: false
      required:
        - self
      properties:
        parent:
          type: object
          nullable: true
          description: The link for the parent category resource.
          additionalProperties: false
          required:
            - url
          properties:
            url:
              description: The URL for the parent category.
              type: string
              format: uri-reference
        categories:
          type: object
          nullable: true
          additionalProperties: false
          required:
            - url
          description: A link to a resource that will return a collection of child categories. This will be null if there are no child categories.
          properties:
            url:
              description: The URL for to the child categories.
              type: string
              format: uri-reference
        products:
          type: object
          nullable: true
          additionalProperties: false
          required:
            - url
          description: A link to a resource that will return a collection of child products. This will be null if there are no child products.
          properties:
            url:
              description: The URL for to the child categories.
              type: string
              format: uri-reference
        self:
          type: object
          description: The canonical link to the catalog resource.
          additionalProperties: false
          required:
            - url
          properties:
            url:
              description: The URL for the specific catalog resource.
              type: string
              format: uri-reference
    StorefrontCatalogCategoryProduct:
      type: object
      description: A definition of the individual product that belongs to a category.
      required:
        - id
        - name
        - status
        - pricing
        - purchaseOptions
        - images
        - _links
      properties:
        id:
          description: A unique identifier for the product within the catalog.
          type: string
        name:
          description: The name of the product.
          type: string
          nullable: true
        description:
          description: The description of the product.
          type: string
        status:
          $ref: "#/components/schemas/StorefrontStatus"
        pricing:
          $ref: "#/components/schemas/StorefrontPricing"
        purchaseOptions:
          $ref: "#/components/schemas/StorefrontPurchaseOptions"
        excludableTypes:
          type: array
          nullable: true
          description: Specifies product types that should be excluded based on user-specific self-exclusion settings.
          items:
            type: string
        attributes:
          type: array
          description: A flexible list of structured attributes for the product.
          items:
            $ref: "#/components/schemas/StorefrontAttribute"
        images:
          description: Array of image objects, where each image source contains an image url.
          type: array
          items:
            $ref: "#/components/schemas/StorefrontImage"
        _links:
          $ref: "#/components/schemas/StorefrontCatalogProductLinks"
    StorefrontCatalogCategoryProducts:
      type: object
      description: A definition of the products that belong to a category.
      additionalProperties: false
      required:
        - serviceType
        - currency
        - categories
        - _links
      properties:
        serviceType:
          enum:
            - delivery
            - collection
          description: Type of service (collection or delivery)
        currency:
          type: string
          description: Name of currency in ISO 4217 format e.g. USD, EUR, GBP.
        products:
          additionalProperties: false
          type: array
          description: A collection of products for the store front
          items:
            $ref: "#/components/schemas/StorefrontCatalogCategoryProduct"
        paging:
          $ref: "#/components/schemas/PagingPagedCursorResponse"
        _links:
          $ref: "#/components/schemas/StorefrontCatalogPagingLinks"
    StorefrontCatalogPagingLinks:
      type: object
      description: Hypermedia links related to the catalog node.
      additionalProperties: false
      required:
        - self
      properties:
        previous:
          type: object
          nullable: true
          additionalProperties: false
          description: A link to the previous page. This will be null if there is only 1 page or the current page is the first page.
          properties:
            url:
              description: The URL for previous page.
              type: string
              format: uri-reference
        next:
          type: object
          nullable: true
          additionalProperties: false
          description: A link to the next page. This will be null if there is only 1 page or the current page is the last page.
          properties:
            url:
              description: The URL for the next page.
              type: string
              format: uri-reference
        self:
          type: object
          description: The canonical link to the catalog resource
          additionalProperties: false
          properties:
            url:
              description: The URL for the specific catalog resource.
              type: string
              format: uri-reference
    StorefrontCatalogProduct:
      type: object
      description: A definition of an individual product within the catalog.
      required:
        - id
        - name
        - status
        - pricing
        - purchaseOptions
        - images
        - _links
      properties:
        id:
          description: A unique identifier for the product within the catalog.
          type: string
        name:
          description: The name of the product.
          type: string
          nullable: true
        description:
          description: The description of the product.
          type: string
        category:
          $ref: "#/components/schemas/StorefrontCatalogProductCategory"
        status:
          $ref: "#/components/schemas/StorefrontStatus"
        pricing:
          $ref: "#/components/schemas/StorefrontPricing"
        purchaseOptions:
          $ref: "#/components/schemas/StorefrontPurchaseOptions"
        excludableTypes:
          type: array
          nullable: true
          description: Specifies product types that should be excluded based on user-specific self-exclusion settings.
          items:
            type: string
        attributes:
          type: array
          description: A flexible list of structured attributes for the product.
          items:
            $ref: "#/components/schemas/StorefrontAttribute"
        images:
          description: Array of image objects, where each image source contains an image url.
          type: array
          items:
            $ref: "#/components/schemas/StorefrontImage"
        _links:
          $ref: "#/components/schemas/StorefrontCatalogProductLinks"
    StorefrontCatalogProductCategory:
      type: object
      description: The direct associated category for the product
      properties:
        id:
          type: string
          description: The unique id of the category
    StorefrontCatalogProductLinks:
      type: object
      description: Hypermedia links related to the catalog node.
      additionalProperties: false
      required:
        - self
      properties:
        parent:
          type: object
          description: The canonical link to the parent category resource.
          additionalProperties: false
          required:
            - url
          properties:
            url:
              description: The URL for a parent category resource.
              type: string
              format: uri-reference
        self:
          type: object
          description: The canonical link to the product resource.
          additionalProperties: false
          properties:
            url:
              description: The URL for the specific catalog resource.
              type: string
              format: uri-reference
    StorefrontCatalogProducts:
      type: object
      description: A definition of the products within a catalog.
      additionalProperties: false
      required:
        - serviceType
        - currency
        - categories
        - _links
      properties:
        serviceType:
          enum:
            - delivery
            - collection
          description: Type of service (collection or delivery)
        currency:
          type: string
          description: Name of currency in ISO 4217 format e.g. USD, EUR, GBP.
        products:
          additionalProperties: false
          type: array
          description: A collection of products for the store front
          items:
            $ref: "#/components/schemas/StorefrontCatalogProduct"
        paging:
          $ref: "#/components/schemas/PagingPagedCursorResponse"
        _links:
          $ref: "#/components/schemas/StorefrontCatalogPagingLinks"
    StorefrontCategories:
      type: object
      description: A definition for the collection categories within a store front catalogue.
      additionalProperties: false
      required:
        - categories
        - _links
      properties:
        categories:
          additionalProperties: false
          type: array
          description: A collection of categories for the store front
          items:
            $ref: "#/components/schemas/StorefrontCatalogCategory"
        paging:
          $ref: "#/components/schemas/PagingPagedCursorResponse"
        _links:
          $ref: "#/components/schemas/StorefrontCatalogPagingLinks"
    StorefrontChoiceRules:
      type: object
      description: Defines the rules for how many times an item can be selected.
      required:
        - min
        - max
        - default
      properties:
        min:
          type: integer
          description: The minimum number of selections required. For a group, this defines the total number of different items that must be chosen. For a single item, this defines its minimum required quantity.
          example: 0
        max:
          type: integer
          description: The maximum number of selections allowed. For a group, this defines the total number of different items that can be chosen. For a single item, this defines its maximum allowed quantity.
          example: 1
        default:
          type: integer
          description: The quantity of a single item that is selected by default. This is primarily used on individual modifiers.
          example: 0
    StorefrontConsent:
      type: object
      nullable: true
      description: The Consent details for a product
      required:
        - type
        - requiresUserConsent
        - displayText
      properties:
        type:
          type: string
          description: The type of consent required (e.g., General, AgeVerification). This field is extensible.
          example: General
        requiresUserConsent:
          type: boolean
          description: Whether the consent requires to be agreed by the user
        displayText:
          type: string
          description: The text to display for the consent
    StorefrontDataSource:
      type: object
      description: The source of the data, including a machine-readable key and a display label.
      required:
        - value
        - displayText
      properties:
        value:
          type: string
          description: The machine-readable source key.
          enum:
            - databank
            - partner
            - prediction
        displayText:
          type: string
          description: The human-readable, translated label.
          example: Partner
    StorefrontDealGroup:
      type: object
      description: A group of deal variation ids that can be applied to a variation.
      required:
        - id
        - name
        - choiceRules
        - variations
      properties:
        id:
          type: string
          description: The identifier of the deal group
        name:
          type: string
          description: The name of the deal group
        choiceRules:
          $ref: "#/components/schemas/StorefrontChoiceRules"
        variations:
          type: array
          description: The list of deal item variations in this group.
          items:
            $ref: "#/components/schemas/StorefrontDealVariation"
    StorefrontDealVariation:
      type: object
      description: A variation that can be added as part of a deal
      required:
        - variation
        - priceAdjustment
        - choiceRules
      properties:
        variation:
          $ref: "#/components/schemas/StorefrontVariation"
          description: The variation for the deal
        priceAdjustment:
          type: number
          format: integer
          description: The amount to add (positive value) or subtract (negative value) from the deal variation's price. This should be specified using minor units (pence/cents) of the currency.
        choiceRules:
          $ref: "#/components/schemas/StorefrontChoiceRules"
    StorefrontDescriptor:
      type: object
      description: A simple, reusable descriptor with a type, a machine-readable value, and a display label.
      required:
        - type
        - value
        - displayText
      properties:
        type:
          type: string
          description: The classification or category of the descriptor.
          example: deposit
        value:
          type: string
          description: The stable, machine-readable value or key.
          example: inclusive
        displayText:
          type: string
          description: The human-readable, translated label.
          example: Inclusive
    StorefrontDisplay:
      type: object
      description: Provides display-ready text for the client.
      required:
        - displayText
      properties:
        name:
          type: string
          nullable: true
          description: The human-readable name or label for the attribute (e.g., "Net Weight").
        displayText:
          type: string
          description: The fully formatted, presentation-ready string to be displayed to the user.
    StorefrontFinancial:
      type: object
      nullable: true
      description: A single financial data point (e.g., price, deposit). It MUST have either `value` or `range`.
      properties:
        value:
          type: number
          nullable: true
          format: double
          description: The financial value (in the root currency).
        range:
          $ref: "#/components/schemas/StorefrontMinMaxRange"
          nullable: true
        descriptor:
          $ref: "#/components/schemas/StorefrontDescriptor"
          nullable: true
          description: An optional, generic descriptor for the value (e.g., "inclusive").
      oneOf:
        - required:
            - value
        - required:
            - range
    StorefrontFinancialAttribute:
      type: object
      description: Adds financial-specific data to the base attribute.
      required:
        - financial
      properties:
        financial:
          $ref: "#/components/schemas/StorefrontFinancial"
    StorefrontImage:
      type: object
      required:
        - url
      properties:
        url:
          description: The url or the image.
          type: string
          format: uri
        altText:
          nullable: true
          description: The alternative text for the image url.
          type: string
    StorefrontMeasurement:
      type: object
      nullable: true
      description: A single, raw measurement data point, with optional alternates.
      required:
        - unit
      properties:
        unit:
          type: string
          description: The physical unit of this measurement (e.g. 'kJ', 'kCal', 'g').
        value:
          type: number
          nullable: true
          description: The raw numerical value for a fixed measurement (e.g. 500).
        range:
          $ref: "#/components/schemas/StorefrontMinMaxRange"
          nullable: true
          description: The optional range (min/max) for a variable measurement.
        referenceMeasure:
          nullable: true
          $ref: "#/components/schemas/StorefrontReferenceMeasure"
          description: The optional context for this measurement (e.g. "per 100g" or "per serving").
        alternate:
          type: array
          description: A list of alternate, equivalent measurements (e.g. kJ for kCal).
          items:
            $ref: "#/components/schemas/StorefrontMeasurement"
      oneOf:
        - required:
            - value
        - required:
            - range
    StorefrontMeasurementAttribute:
      type: object
      description: Adds measurement-specific data to the base attribute.
      required:
        - measurement
      properties:
        measurement:
          $ref: "#/components/schemas/StorefrontMeasurement"
    StorefrontMinMaxRange:
      type: object
      nullable: true
      description: The optional range (min/max) for a variable measurement. If present, this object MUST contain at least one of 'min' or 'max'.
      properties:
        min:
          type: number
          nullable: true
          description: The minimum value of the range.
        max:
          type: number
          nullable: true
          description: The maximum value of the range.
      minProperties: 1
    StorefrontModifier:
      type: object
      description: A specific modification that can be applied, often with a price change.
      required:
        - id
        - name
        - priceAdjustment
        - choiceRules
        - status
      properties:
        id:
          type: string
          description: The identifier of the modifier
        name:
          type: string
          description: The name of the modifier
        priceAdjustment:
          type: number
          format: integer
          description: The amount to add (positive value) or subtract (negative value) when this modifier is selected. This should be specified using minor units (pence/cents) of the currency.
        choiceRules:
          $ref: "#/components/schemas/StorefrontChoiceRules"
        status:
          $ref: "#/components/schemas/StorefrontStatus"
        attributes:
          type: array
          description: A flexible list of structured attributes for the product.
          items:
            $ref: "#/components/schemas/StorefrontAttribute"
    StorefrontModifierGroup:
      type: object
      description: A group of related modifiers that can be applied to a variation.
      required:
        - id
        - name
        - choiceRules
        - modifiers
      properties:
        id:
          type: string
          description: The identifier of the modifier group
        name:
          type: string
          description: The name of the modifier group
        choiceRules:
          $ref: "#/components/schemas/StorefrontChoiceRules"
        modifiers:
          type: array
          description: The list of available modifiers in this group.
          items:
            $ref: "#/components/schemas/StorefrontModifier"
    StorefrontPricing:
      type: object
      description: A container for all pricing-related information for a product
      required:
        - amount
        - isVariable
      properties:
        amount:
          type: number
          format: integer
          description: The monetary value of the price. This should be specified using minor units (pence/cents) of the currency.
        isVariable:
          type: boolean
          description: A boolean flag indicating that the final price is not fixed and can change based on customer selections or other factors.
    StorefrontProduct:
      type: object
      required:
        - id
        - name
        - categories
        - serviceType
        - currency
        - pricing
        - type
        - purchaseOptions
        - status
        - variations
      properties:
        id:
          description: The product identifier.
          type: string
        name:
          description: The name of the product.
          type: string
        description:
          type: string
          description: A detailed description of the menu item.
          nullable: true
        categories:
          type: array
          description: List of categories this product is in
          items:
            $ref: "#/components/schemas/StorefrontCatalogCategory"
        serviceType:
          enum:
            - delivery
            - collection
          description: Type of service (collection or delivery)
        currency:
          type: string
          description: Name of currency in ISO 4217 format e.g. USD, EUR, GBP.
        pricing:
          $ref: "#/components/schemas/StorefrontPricing"
        type:
          type: string
          description: The type of product
          enum:
            - product
            - deal
        images:
          description: Array of product image references.
          type: array
          items:
            $ref: "#/components/schemas/StorefrontImage"
        labels:
          type: array
          description: List of labels to be applied to the product.
          items:
            type: string
            description: Labels like vegetarian, "Black Friday", or "As seen in..."
        purchaseOptions:
          $ref: "#/components/schemas/StorefrontPurchaseOptions"
        excludableTypes:
          type: array
          nullable: true
          description: Specifies product types that should be excluded based on user-specific self-exclusion settings.
          items:
            type: string
        consent:
          $ref: "#/components/schemas/StorefrontConsent"
        status:
          $ref: "#/components/schemas/StorefrontStatus"
        variations:
          type: array
          description: A list of all available variations for this product.
          items:
            $ref: "#/components/schemas/StorefrontVariation"
        attributes:
          type: array
          description: A flexible list of structured attributes for the product.
          items:
            $ref: "#/components/schemas/StorefrontAttribute"
    StorefrontPurchaseOptions:
      type: object
      description: Describes the purchase options for the product
      required:
        - requiresCustomisation
        - restrictions
      properties:
        requiresCustomisation:
          type: boolean
          description: If 'true', the product requires customisation (e.g., selecting size) before it can be added to the basket. If 'false', it can be added directly.
        restrictions:
          type: array
          description: A list of all restrictions that apply to this product.
          items:
            $ref: "#/components/schemas/StorefrontRestriction"
    StorefrontReferenceMeasure:
      type: object
      nullable: true
      description: A structured reference for a measurement, defining its context (e.g., "100g" or "1 can").
      required:
        - unit
        - value
      properties:
        unit:
          type: string
          description: The unit of the context.
          example: g
        value:
          type: number
          description: The value of the context.
          example: 100
    StorefrontRestriction:
      type: object
      description: A single, structured product restriction.
      required:
        - type
        - dataType
        - display
      properties:
        type:
          type: string
          description: A stable, machine-readable key for the restriction.
          example: age_restriction
        dataType:
          type: string
          description: The discriminator, defining the structure of the data payload.
          example: age
        display:
          $ref: "#/components/schemas/StorefrontDisplay"
      oneOf:
        - $ref: "#/components/schemas/StorefrontAgeRestriction"
      discriminator:
        propertyName: dataType
        mapping:
          age: "#/components/schemas/StorefrontAgeRestriction"
    StorefrontStatus:
      type: object
      description: Represents the status of an item.
      additionalProperties: false
      required:
        - isOffline
        - hasLowStock
      properties:
        isOffline:
          type: boolean
          description: Describes if all variations are offline or all required modifiers for all variations are offline.
        hasLowStock:
          type: boolean
          description: Describes if all variations have low stock or all required modifiers for all variations have low stock
    StorefrontVariation:
      type: object
      description: Represents a specific variation of a product, including its customisation options.
      required:
        - id
        - name
        - pricing
        - status
      properties:
        id:
          type: string
          description: The unique identifier of the variation.
        name:
          type: string
          description: The display name of the variation.
        description:
          type: string
          description: A detailed description for this specific variation.
          nullable: true
        pricing:
          $ref: "#/components/schemas/StorefrontPricing"
        gtin:
          type: string
          description: The GS1 GTIN code to uniquely identify a given product. This may be an EAN, APN, ISBN or UPC.
          nullable: true
        status:
          $ref: "#/components/schemas/StorefrontStatus"
        labels:
          nullable: true
          type: array
          description: List of labels to be applied to the variation
          items:
            type: string
            description: Labels like vegetarian, "Black Friday", or "As seen in..."
        modifierGroups:
          type: array
          nullable: true
          description: A list of modifier groups available for this variation.
          items:
            $ref: "#/components/schemas/StorefrontModifierGroup"
        dealGroups:
          type: array
          nullable: true
          description: A list of deal groups available for this variation.
          items:
            $ref: "#/components/schemas/StorefrontDealGroup"
        consent:
          $ref: "#/components/schemas/StorefrontConsent"
        attributes:
          type: array
          description: A flexible list of structured attributes for the product.
          items:
            $ref: "#/components/schemas/StorefrontAttribute"
  responses:
    JetConnectMenusUtfConnectorBadRequestResponse:
      description: The request is malformed, needs adjusting
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/JetConnectMenusUtfConnectorErrorResponse"
    JetConnectMenusUtfConnectorForbiddenResponse:
      description: An aspect of the request is forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/JetConnectMenusUtfConnectorErrorResponse"
    JetConnectMenusUtfConnectorServerErrorResponse:
      description: The request is okay, but upstream communication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/JetConnectMenusUtfConnectorErrorResponse"
    JetConnectRestaurantAvailabilityApiBadRequestResponse:
      description: The request is malformed, needs adjusting
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/JetConnectRestaurantAvailabilityApiErrorResponse"
    JetConnectRestaurantAvailabilityApiForbiddenResponse:
      description: An aspect of the request is forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/JetConnectRestaurantAvailabilityApiErrorResponse"
    JetConnectRestaurantAvailabilityApiInternalServerErrorResponse:
      description: The request is okay, but upstream communication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/JetConnectRestaurantAvailabilityApiErrorResponse"
    JetConnectRestaurantAvailabilityApiNotFoundResponse:
      description: The restaurant was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/JetConnectRestaurantAvailabilityApiErrorResponse"
  headers:
    CacheControl:
      description: Information about how the response can be cached.
      schema:
        type: string
        description: The HTTP Cache-Control header holds directives (instructions) in both requests and responses that control caching in browsers and shared caches
    RetryAfter:
      required: false
      schema:
        type: string
      description: The Retry-After HTTP response header indicates how long the User Agent should wait before making a follow-up request
  securitySchemes:
    api_key:
      name: Authorization
      description: APIs for delivery partners require an API key that will have been issued to you.
      in: header
      type: apiKey
    basic_auth:
      description: A few services allow the use of basic authentication when a partner doesn't support OAuth based authentication.
      scheme: basic
      type: http
    daas_jwt:
      type: http
      description: Bearer token authentication using a JSON Web Token (JWT), used for delivery as a service endpoints.
      bearerFormat: JWT token.
      scheme: bearer
    X-Flyt-Api-Key:
      name: X-Flyt-Api-Key
      description: API Key for services run by JET Connect, formerly known as Flyt.
      in: header
      type: apiKey
