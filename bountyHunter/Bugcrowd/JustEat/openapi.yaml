    DaasDaaSNotificationConfigRequest:
      type: object
      description: The notification config object.
      required:
        - email
        - endpoint
        - secret
        - type
      properties:
        email:
          type: string
          description: Email of the partner to contact in case there are any issues with the notifications.
          nullable: false
        endpoint:
          type: string
          description: Partner's HTTPS endpoint to receive events and notifications. Make sure the endpoint is properly prefixed as we only support HTTPS (secure) URLs.
          nullable: false
        secret:
          type: string
          description: The token or password.
          nullable: false
        type:
          type: string
          description: Type of configuration.
          enum:
            - BASIC
            - TOKEN
          nullable: false
        username:
          type: string
          description: The username of the partner's credentials to store. Only required for type BASIC.
          nullable: true
        subscriptions:
          type: array
          description: List of notification events to subscribe to. The partner will be subscribed to all events if this parameter is not supplied. On the other hand, if an empty list is supplied, you will be unsubscribed from all events.
          items:
            type: string
            enum:
              - ALL
              - COURIERJOBSTATUS
              - CANCELJOBSTATUS
              - COURIERCOLLECTIONTIME
              - COURIERLOCATION
              - DELIVERYREJECTED
              - COURIERDELIVERYTIME
              - PROOFOFDELIVERY
              - PROOFOFDELIVERY_PICTURE
          nullable: true
      example:
        email: email@partner.com
        endpoint: endpoint-partner.ca/webhook
        secret: partner-password
        type: BASIC
        username: partner-username
        subscriptions:
          - COURIERJOBSTATUS
          - CANCELJOBSTATUS
    DaasDaaSNotificationConfigResponse:
      type: object
      description: The notification config object.
      properties:
        email:
          type: string
          description: Email of the partner to contact in case there are any issues with the notifications.
          nullable: false
        endpoint:
          type: string
          description: Partner's endpoint for events and notifications to be sent to.
          nullable: false
        type:
          type: string
          description: Type of configuration.
          nullable: false
        username:
          type: string
          description: The username of the partner's credentials to store. Only required for type BASIC.
          nullable: true
        subscriptions:
          type: array
          description: List of notification events partner is subscribed to.
          nullable: true
      example:
        email: email@partner.com
        endpoint: endpoint-partner.ca/webhook
        type: BASIC
        username: partner-username
        subscriptions:
          - CANCELJOBSTATUS
    DaasDaaSNotificationConfigWebhookRequest:
      type: object
      description: The webhook notification config object.
      required:
        - id
        - type
        - timestamp
        - data
      properties:
        id:
          type: string
          description: Event UUID
          nullable: false
        type:
          type: string
          description: Event Type
          nullable: false
          enum:
            - COURIERJOBSTATUS
            - CANCELJOBSTATUS
            - COURIERCOLLECTIONTIME
            - DELIVERYCREATED
            - COURIERLOCATION
            - DELIVERYREJECTED
            - COURIERDELIVERYTIME
            - PROOFOFDELIVERY
            - PROOFOFDELIVERY_PICTURE
        timestamp:
          description: The timestamp in UTC.
          type: string
          nullable: false
          format: date-time
        data:
          nullable: false
          anyOf:
            - $ref: "#/components/schemas/DaasDaaSDelcoNotification"
            - $ref: "#/components/schemas/DaasDaaSScooberNotification"
          description: |
            The following data is dispatched to the partner through the webhook endpoint.  Please note that `CourierLocation` is not presently available for the following markets [BE, BG, DK, IT, NL, PL, ES, CH].
      example:
        id: ee70cb3c-d7fa-11ec-9d64-0242ac120002
        type: COURIERJOBSTATUS
        timestamp: 2021-12-20T15:25:33.339Z
        data:
          status: DELIVERED
          requestId: e0d58b3a-f547-4013-a4e5-728263040f33
          orderId: efeb46ce-53eb-44cd-afba-ba59e7b84a89
          orderTrackerURL: http://www.skipthedishes.com/order-tracker/efeb46ce-53eb-44cd-afba-ba59e7b84a89
          courier:
            name: Example Courier
