paths:
  /auth/realms/daas/protocol/openid-connect/token:
    post:
      tags:
        - Operate Platform
        - Manage Public Ingress Gateway
        - Delivery as a Service
        - publicly-accessible
      summary: Generate JSON Web Token
      description: The Generate JSON Web Token endpoint enables partners to generate an authentication token used by other endpoints.
      operationId: authRealmsDaasProtocolOpenidConnectTokenPost
      security:
        - basic_auth: []
      parameters:
        - name: User-Agent
          description: |
            Identifies the client application, library, or device making the API request. Typically includes the application name, version, and optionally the operating system or platform details. Example: `MyApp/1.0.0 (Linux; x86_64)`.
          schema:
            type: string
          in: header
          required: true
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/DaasDaasConnectTokenRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DaasDaasKeycloakAuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DaasDaasUnauthorizedException"
              example:
                error: invalid_client
                error_description: Invalid client or Invalid client credentials
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DaasDaasForbiddenException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DaasDaasErrorException"
              example:
                message: Not Found
      servers:
        - url: https://<api-env>.skipthedishes.com
          description: Production URL <api-env = [api, api-produk, api-prodaus, api.prodeu1]>
        - url: https://<api-env>.skipthedishes.com
          description: Testing URL <api-env = [api-staging, api-staguk, api-stagaus, api.stageu1]>
      x-component-name: daasapigw
      x-status: Draft
  /delivery/pools:
    get:
      tags:
        - Logistic Management
        - Manage Delivery Suppliers
        - publicly-accessible
      summary: Get your delivery pools
      description: A delivery pool is a named group of drivers which deliver food for a set of restaurants.
      operationId: deliveryPoolsGet
      parameters:
        - name: x-jet-application
          in: header
          schema:
            type: string
          required: false
          description: Descriptor of client or internal application
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                description: Describes a delivery pool
                properties:
                  delivery-pool-id:
                    description: Details of a delivery pool id
                    properties:
                      name:
                        description: The name of the pool, used by operations teams, in reports, etc.
                        type: string
                      restaurants:
                        items:
                          format: int32
                          type: number
                        description: A list of Just Eat restaurant ids served by the delivery pool.
                        type: array
                    type: object
                type: object
              examples:
                response:
                  value:
                    d5f72466a6dd49a08166d5a044c5b9e4:
                      name: Toronto - West
                      restaurants:
                        - 123
                        - 456
                    b9c6673b8e5948b98cfbd14a982de2c2:
                      name: Toronto - East
                      restaurants:
                        - 789
        "429":
          description: "Too Many Requests : Request not completed as server has received too many requests in a given amount of time."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4XxErrorSchema"
              example:
                fault:
                  traceId: 0HLOCKDKQPKIU
                  faultId: 72d7036d-990a-4f84-9efa-ef5f40f6044b
                  errors:
                    - description: Couldn't complete request
        "500":
          description: Internal Server Error
          content:
            text/plain:
              examples:
                response:
                  value: Internal Server Error
      x-component-name: deliveryconfigurationapi
      x-status: Stable
    post:
      tags:
        - Logistic Management
        - Manage Delivery Suppliers
        - publicly-accessible
      summary: Create a new delivery pool
      description: A delivery pool is a named group of drivers which deliver food for a set of restaurants.
      operationId: deliveryPoolsPost
      parameters:
        - name: x-jet-application
          in: header
          schema:
            type: string
          required: false
          description: Descriptor of client or internal application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryPoolCreateDeliveryPool"
      responses:
        "201":
          description: Pool has been created.
        "400":
          description: There was something invalid in your request - check response body for details
          content:
            application/json:
              examples:
                response:
                  value:
                    name:
                      - "'Name' should not be empty"
        "429":
          description: "Too Many Requests : Request not completed as server has received too many requests in a given amount of time."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4XxErrorSchema"
              example:
                fault:
                  traceId: 0HLOCKDKQPKIU
                  faultId: 72d7036d-990a-4f84-9efa-ef5f40f6044b
                  errors:
                    - description: Couldn't complete request
        "500":
          description: Internal Server Error
          content:
            text/plain:
              examples:
                response:
                  value: Internal Server Error
      x-component-name: deliveryconfigurationapi
      x-status: Stable
  /delivery/pools/{deliveryPoolId}/availability/relative:
    get:
      tags:
        - Logistic Management
        - Manage Delivery Suppliers
        - publicly-accessible
      summary: Get availability for pickup
      description: Get the current amount of time it will take a driver to collect a new order from a restaurant in the pool.
      operationId: deliveryPoolsDeliveryPoolIdAvailabilityRelativeGet
      parameters:
        - required: true
          description: Identifier for the pool
          name: deliveryPoolId
          schema:
            type: string
          in: path
        - name: x-jet-application
          in: header
          schema:
            type: string
          required: false
          description: Descriptor of client or internal application
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                properties:
                  bestGuess:
                    description: Your best estimation (hh:mm:ss)
                    type: string
                type: object
              examples:
                request:
                  value:
                    bestGuess: 00:35:00
        "404":
          description: The pool could not be found
        "429":
          description: "Too Many Requests : Request not completed as server has received too many requests in a given amount of time."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4XxErrorSchema"
              example:
                fault:
                  traceId: 0HLOCKDKQPKIU
                  faultId: 72d7036d-990a-4f84-9efa-ef5f40f6044b
                  errors:
                    - description: Couldn't complete request
      x-component-name: deliveryconfigurationapi
      x-status: Stable
    put:
      tags:
        - Logistic Management
        - Manage Delivery Suppliers
        - publicly-accessible
      summary: Set availability for pickup
      description: Set the average amount of time it will take a driver to collect a new order from a restaurant in the pool.
      operationId: deliveryPoolsDeliveryPoolIdAvailabilityRelativePut
      parameters:
        - required: true
          description: Identifier for the pool
          name: deliveryPoolId
