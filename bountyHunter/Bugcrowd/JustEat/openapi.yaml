        - jet-connect
        - publicly-accessible
      summary: Receive Order
      description: |-
        When an order is received for your integrated restaurant on a delivery website, the JET Connect Platform will send it to the endpoint you provided, as a `POST` request. Your endpoint must be able to receive orders in the format documented below.

        As an additional security measure, orders can be sent from a static IP address. You can request this feature from your brand manager.
