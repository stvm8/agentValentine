  /final/{finalPickedOrder}:
    post:
      tags:
        - JET Connect for Dispatch Orders
        - jet-connect
        - publicly-accessible
      summary: Final Picked Order
      description: |-
        Final picked order is for brands that may make amendments to an order and want to receive a copy of the order in its final state i.e. after all amendments have applied. This can be integrated or non integrated. please contact your brand manager for more information. after the initial order injection has already taken place (e.g. due to items potentially being out of stock), and would like to be notified of these changes to the initial order.

        Once the order has been picked (currently the trigger point for this is the "last mile delivered" event), the platform will check for any amendments on the order, and send the "final picked" order back to the specified endpoint.

        The "final picked" order could be different from the original order, as items may have been marked out of stock during the order pick. As such the total price, or item quantities may have changed.

        In the event you would like to receive the final order, there are several combinations of injections you can subscribe to.

        ### Scenario 1 (receive only the initial order)

        Receive only the initial order  in the state it was originally placed, at the point the driver is prep time away from the store. JET Connect  will send the order to the "Received Order" endpoint, as a `POST` request. Your endpoint must be able to receive orders in the same format documented in the "Received Order" section.

        ### Scenario 2 (receive only the final pick order)

        When the order is picked, the JET Connect Platform will check for amendments, and send a request to the final picked order endpoint you provided with any changes, as a `POST` request. Your endpoint must be able to receive orders in the format documented under "request format".

        ### Scenario 3 (receive both the initial order, and the final pick order)

        If you would like to receive both of the requests documented above, this is also possible. Please contact your brand manager to have this configured.

        #### Request format

        As an additional security measure, orders can be sent from the same static IP address as the initial order. You can request this feature from your brand manager.
      operationId: finalFinalPickedOrderPost
      parameters:
        - name: finalPickedOrder
          in: path
          description: The endpoint you have provided to us.
          required: true
          schema:
            type: string
          example: https://www.your-base-url.com/finalPickedOrders
        - $ref: "#/paths/~1initial~1%7BreceiveOrder%7D/post/parameters/1"
        - $ref: "#/paths/~1initial~1%7BreceiveOrder%7D/post/parameters/2"
        - name: x-jet-application
          in: header
          schema:
            type: string
          required: false
          description: Descriptor of client or internal application
      requestBody:
        description: |-
          The endpoint you provide to JET Connect must be able to receive orders in the following format. The type property will determine fulfillment type.

          As an additional security measure, orders can be sent from a static IP address. You can request this feature from your integration team.
