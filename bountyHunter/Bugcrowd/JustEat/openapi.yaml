        pattern: ^[0-2][0-9]:[0-5][0-9] - [0-2][0-9]:[0-5][0-9]$
        example: 10:00 - 23:30
    JetConnectOrderInjectionStatusUpdaterAsyncOrderFailed:
      description: The request body to send to mark an order as failed.
      type: object
      required:
        - happenedAt
        - errorCode
        - errorMessage
      properties:
        happenedAt:
          description: ISO timestamp that the order was marked as failed.
          type: string
          format: date-time
        errorCode:
          description: |-
            Indicates the failure reason. Possible values:

            - `INACTIVE`: the POS is offline and cannot take orders.
            - `INCORRECT_SETUP`: the configuration details sent with the order are wrong (e.g. store ID)
            - `IN_USE`: the POS is currently in use and cannot take requests.
            - `TIMEOUT`: the request to the POS timed out.
            - `NOT_SUPPORTED`: integrated ordering is not supported at this restaurant.
            - `MENU_ERROR`: the order had incorrect items (not in stock, PLU not in POS).
            - `MALFORMED_REQUEST`: the order request was malformed (e.g. malformed JSON).
            - `AUTH_FAILED`: the order authorization was incorrect.
            - `STORE_CLOSED`: the store is closed and cannot take orders.
            - `TENDER_ERROR`: the `tender_type` sent to the POS is wrong.
          type: string
          pattern: ^(UNKNOWN|INACTIVE|INCORRECT_SETUP|IN_USE|TIMEOUT|NOT_SUPPORTED|MENU_ERROR|MALFORMED_REQUEST|AUTH_FAILED|STORE_CLOSED|TENDER_ERROR)$
        errorMessage:
          description: Describes the failure reason
          type: string
        transmissionId:
          description: The Transmission ID that was sent in the order payload. This is optional, it only becomes necessary for partners on multi injection flow.
          type: string
    JetConnectOrderInjectionStatusUpdaterAsyncOrderSuccess:
      description: The request body to send to mark an order as successful.
      type: object
      properties:
        transmissionId:
          description: The Transmission ID that was sent in the order payload. This is optional, it only becomes necessary for partners on multi injection flow.
          type: string
    JetConnectOrderInjectionStatusUpdaterChannel:
      description: Details about the delivery partner who sent the order.
      type: object
      required:
        - name
        - id
      properties:
        name:
          description: Delivery partner name.
          type: string
        id:
          description: Delivery partner unique ID.
          type: number
    JetConnectOrderInjectionStatusUpdaterCollectAt:
      description: UNIX timestamp of when the order will be collected by the customer or driver. Only present on delivery-by-delivery-partner and collection-by-customer orders.
      type: string
      pattern: ^[0-9]+$
    JetConnectOrderInjectionStatusUpdaterCollectionNotes:
      description: Notes provided by the customer regarding their collection of the order. Only present on collection-by-customer orders.
      type: string
    JetConnectOrderInjectionStatusUpdaterCreatedAt:
      description: UNIX timestamp indicating when the order was created.
      type: string
      pattern: ^[0-9]+$
    JetConnectOrderInjectionStatusUpdaterDeliverAt:
      description: UNIX timestamp of when the order should be delivered to the customer. Only present on delivery-by-merchant orders.
      type: string
      pattern: ^[0-9]+$
    JetConnectOrderInjectionStatusUpdaterDelivery:
      description: Details about where the order should be delivered to. Only present on delivery-by-merchant and delivery-by-delivery-partner orders, and some properties may be masked depending on the delivery partner.
      type: object
      required:
        - first_name
        - last_name
        - phone_number
        - phone_masking_code
        - line_one
        - line_two
        - city
        - postcode
        - email
        - coordinates
      properties:
        first_name:
          description: The delivery recipient's first name.
          type: string
        last_name:
          description: The delivery recipient's last name.
          type: string
        phone_number:
          description: The delivery recipient's phone number. Alternatively, the number of a call centre which to provide the `phone_masking_code` to.
          type: string
        phone_masking_code:
          $ref: "#/components/schemas/JetConnectOrderInjectionStatusUpdaterPhoneMaskingCode"
        street_number:
          description: The street number of the delivery address.
          type: string
        street:
          description: The street of the delivery address.
          type: string
        line_one:
          description: The first line of the delivery address.
          type: string
        line_two:
          description: The second line of the delivery address.
          type: string
        city:
          description: The city of the delivery address.
          type: string
        postcode:
          description: The postcode or zip code of the delivery address.
          type: string
        company_name:
          description: The name of the company.
          type: string
          maxLength: 128
        email:
          description: The delivery recipient's email address.
          type: string
        coordinates:
          description: GPS coordinates of the delivery address
          type: object
          required:
            - latitude
            - longitude
            - latitude_as_string
            - longitude_as_string
          properties:
            latitude:
              description: A float number indicating the longitude.
              type: number
              format: float
            longitude:
              description: A float number indicating the latitude.
              type: number
              format: float
            latitude_as_string:
              description: The longitude converted to string format.
              type: string
            longitude_as_string:
              description: The latitude converted to string format.
              type: string
        tax_id:
          description: Tax ID is provided for PL only as its a legal requirement.
          type: string
    JetConnectOrderInjectionStatusUpdaterDeliveryNotes:
      description: Notes provided by the customer regarding the delivery of the order. Only present on delivery-by-merchant orders.
      type: string
    JetConnectOrderInjectionStatusUpdaterExtras:
      description: Extra details for the order. Only supported by Just Eat.
      type: object
      properties:
        just_eat_order_api_id:
          description: Just Eat ID for this order.
          type: string
    JetConnectOrderInjectionStatusUpdaterFailureResponse:
      description: Bad request
      type: object
      properties:
        message:
          description: Describes why the order status update was rejected.
          type: string
          example: order 60298a19-9ef7-4860-bf69-f10fc0a26b21 not found
      required:
        - message
    JetConnectOrderInjectionStatusUpdaterId:
      description: JET Connect Platform's order ID. Used for updating the status of asynchronous orders.
      type: string
    JetConnectOrderInjectionStatusUpdaterItem:
      description: |-
        A menu item contained in the order.

        If an item-level promotion is applied by the delivery partner, the interested item(s) won't appear on the top level items array, but on the `promotion.items` one.
      type: object
      required:
        - name
        - description
        - plu
        - price
        - notes
      properties:
        name:
          description: Menu item name.
          type: string
        description:
          description: Menu item description.
          type: string
        plu:
          description: Menu item's Price Lookup Unit.
          type: string
        price:
          description: Menu item price indicated by an integer number in pounds and pence / dollars and cents, for example `1950` means `£19.50` or `$19.50`.
          type: number
        unitDepositAmount:
          description: The deposit paid for the item in the minor unit of the currency. For example `50` means `£0.50` or `$0.50`.
          type: number
        notes:
          description: Preparation notes that have been entered by the customer for this menu item (if any).
          type: string
        children:
          description: |-
            Array of objects representing modifier group options.

            When defining promotions of type `FREE_ITEM_MIN_BASKET`, this array should be empty.
          type: array
          items:
            $ref: "#/components/schemas/JetConnectOrderInjectionStatusUpdaterOption"
        substitution:
          $ref: "#/components/schemas/JetConnectOrderInjectionStatusUpdaterSubstitution"
    JetConnectOrderInjectionStatusUpdaterItems:
      description: Array of menu items contained in the order. Except where otherwise noted, all properties are the same as provided when the menu was last published for this restaurant.
      type: array
      items:
        $ref: "#/components/schemas/JetConnectOrderInjectionStatusUpdaterItem"
    JetConnectOrderInjectionStatusUpdaterKitchenNotes:
      description: Notes provided by the customer regarding the preparation of the order. This information may not be available for every delivery partner. Confirm with your integration team whether this field will be available.
      type: string
    JetConnectOrderInjectionStatusUpdaterLocation:
      description: Additional details for the location.
      type: object
      required:
        - id
        - timezone
      properties:
        id:
          description: Delivery partner's identifier for the location.
          type: number
        timezone:
          description: ISO timezone for the location as configured on the JET Connect Platform.
          type: string
    JetConnectOrderInjectionStatusUpdaterMoneyValue:
      description: A monetary value including taxes. (Amounts are always positive, discounts are labelled as such and are subtracted from the total payment.)
      type: object
      required:
        - inc_tax
        - tax
      properties:
        inc_tax:
          description: The amount including tax.
          type: number
        tax:
          description: The tax that was applied.
          type: number
    JetConnectOrderInjectionStatusUpdaterOption:
      description: An option for an item, as defined by the modifier group options you provided in the menu request.
      type: object
      required:
        - name
        - description
        - plu
        - price
      properties:
        name:
          description: The name of the item to be fulfilled, as provided by you in the menu request.
          type: string
        description:
          description: The description of the item to be fulfilled, as provided by you in the menu request.
          type: string
        plu:
          description: The PLU (price lookup unit) of the item to be fulfilled, as provided by you in the menu request.
          type: string
        price:
          description: The price of the item, in cents, pence or other currency.
          type: number
        unitDepositAmount:
          description: The deposit paid for the item in the minor unit of the currency. For example `50` means `£0.50` or `$0.50`.
          type: number
    JetConnectOrderInjectionStatusUpdaterOrderAccepted:
      description: If you would like to handle the order asynchronously, return a 202 status code. JET Connect will place the order in a pending state, which will fail after 3 minutes if you do not notify JET Connect through the Update Order Status endpoint. If this endpoint is not called within 3 minutes, the order will be marked as failed to inject.
      type: object
      required:
        - OrderId
      properties:
        OrderId:
          description: The order identifier.
          type: string
          example: 1234-1234-1234
    JetConnectOrderInjectionStatusUpdaterOrderFailed:
      description: Any non-2xx status codes will be taken as a failure and redirected to the tablet to be hand-keyed into your POS.
      type: object
      required:
        - errorMessage
      properties:
        errorMessage:
          description: A description of the error
          type: string
          example: STORE_1234 is currently out of stock for PLU ABC321
    JetConnectOrderInjectionStatusUpdaterOrderSuccess:
      description: To indicate that the order was successfully processed, return a `200` status code with an Order Number. JET Connect will notify your delivery partner that the order was successfully processed.
      type: object
      required:
        - OrderId
      properties:
        OrderId:
          description: The order identifier.
          type: string
          example: 1234-1234-1234
    JetConnectOrderInjectionStatusUpdaterOrderUnauthorized:
      description: Unauthorized. Authorization failed or the HMAC validation did not match.
      type: object
      required:
        - errorMessage
      properties:
        errorMessage:
          description: A description of the error
          type: string
          example: HMAC mismatch, authorization failed. The response body did not match.
    JetConnectOrderInjectionStatusUpdaterPayment:
      description: Details about the payment, including taxes and discounts. Amounts are in cents or pence.
      type: object
      required:
        - items_in_cart
        - deposit
        - adjustments
        - final
      properties:
        items_in_cart:
          $ref: "#/components/schemas/JetConnectOrderInjectionStatusUpdaterMoneyValue"
        deposit:
          description: The total deposit paid for the order in the minor unit of the currency . For example `50` means `£0.50` or `$0.50`.
          type: number
        adjustments:
          description: Adjustments to the order total, such as delivery fees, service fees, bag fees, small order fees, discounts or deposits. These adjustments are configured by the delivery partner (they cannot be sent with menus).
          type: array
          items:
            type: object
            required:
              - name
              - price
            properties:
              name:
                description: Type of adjustment applied.
                type: string
                enum:
                  - deliveryFee
                  - serviceCharge
                  - bagfee
                  - smallOrderFee
                  - driverTip
                  - discount
                  - itemDepositGroup
                  - other
              price:
                $ref: "#/components/schemas/JetConnectOrderInjectionStatusUpdaterMoneyValue"
        final:
          $ref: "#/components/schemas/JetConnectOrderInjectionStatusUpdaterMoneyValue"
    JetConnectOrderInjectionStatusUpdaterPaymentMethod:
      description: Method that the order was paid with.
      type: string
      enum:
        - CARD
        - CASH
        - HOME_CREDITCARD
        - HOME_DEBITCARD
    JetConnectOrderInjectionStatusUpdaterPerson:
      description: |-
        Details about the person (driver or collector). Some properties may be masked depending on your delivery partner.

        If it's the driver, it contains details about the driver who will be picking up the order. Only present on delivery-by-delivery-partner orders.

        If it's the collector, it contains details about the customer who will be picking up the order. Only present on collection-by-customer orders.
      type: object
      required:
        - first_name
        - last_name
        - phone_number
      properties:
        first_name:
          description: The person's first name.
          type: string
        last_name:
          description: The person's last name.
          type: string
        phone_number:
          description: The person's phone number.
          type: string
        phone_masking_code:
          $ref: "#/components/schemas/JetConnectOrderInjectionStatusUpdaterPhoneMaskingCode"
    JetConnectOrderInjectionStatusUpdaterPhoneMaskingCode:
      description: |-
        The code used to unmask the phone number (only certain delivery partners).

        Some of the delivery partners, in order to comply with GDPR regulations, are not allowed to send the customer phone number directly in the order. In this case, a service provider call centre number is provided, along with a `phone_masking_code` value.

        If the driver / restaurant will need to call the customer, they will need to phone up the `phone_number` and provide the `phone_masking_code`. The call centre will put them in touch with the user, without exposing their PII directly.
      type: string
    JetConnectOrderInjectionStatusUpdaterPosLocationId:
      description: The POS or `3PA` identifier you have provided to JET Connect for this restaurant. You should use this to route the order to the correct restaurant.
      type: string
    JetConnectOrderInjectionStatusUpdaterPromotions:
      description: Array of promotion objects.
      type: array
      items:
        type: object
        required:
          - type
          - items
          - promotion_id
          - discount_value
          - offer_id
        properties:
          type:
            description: |-
              The type of promotion applied to the order. Supported values vary dependant on service provider:
              - `PERCENTAGE_DISCOUNT`: Available only in ES, IE, IT, UK.
              - `FREE_ITEM`: Available only in ES, IE, IT, UK.
              - `FREE_ITEM_MINIMUM_BASKET`: Available only in CA.
              - `ITEM_LEVEL_DISCOUNT`: Available in AU, CA, ES, IE, IT, NZ, UK.
              - `STAMP_CARD`: Available in UK, IE, AU, IT, ES.
              - `BUY_ONE_GET_ONE_FREE`: Available ES, IE, IT, UK, DE, NL, AT, BE, BG, DK, LU, PL and SK.
              - `BUY_ONE_GET_ONE_FREE_MIX_AND_MATCH`: Available in UK, IE, AU, IT, ES.
              - `TOTAL_ORDER`: Available in ES, IE, IT, UK, DE, NL, AT, BE, BG, DK, LU, PL and SK.
            type: string
          items:
            description: An array of menu items for which this promotion applies. Except where otherwise noted, all properties are the same as provided when the menu was last published for this restaurant.
            type: array
            items:
              $ref: "#/components/schemas/JetConnectOrderInjectionStatusUpdaterItem"
          promotion_id:
            type: string
            description: The identifier of the promotion
          discount_value:
            type: number
            format: double
            description: How much the item is discounted
          offer_id:
            type: string
            description: The identifier of the offer
    JetConnectOrderInjectionStatusUpdaterSubstitution:
      type: object
      description: If an item cannot be fulfilled, the customer can mark the item as substitutable at point of ordering (currently only supported within grocer orders). This field will not be sent to POS providers who do not support substitutions
      properties:
        preference:
          type: string
          enum:
            - bestmatch
          description: The customer's preference related to a substitution
    JetConnectOrderInjectionStatusUpdaterTenderType:
      description: An identifier for the payment method. If your POS integration requires a this field, please contact your brand manager.
      type: string
    JetConnectOrderInjectionStatusUpdaterThirdPartyOrderReference:
      description: Delivery partner's identifier for the order. This is the order number that is displayed to the customer on the delivery partner website, and will be referenced when the order is picked up.
      type: string
    JetConnectOrderInjectionStatusUpdaterType:
      description: |-
        Indicates how the order will be fulfilled. Accepts the following values:
        - `delivery-by-delivery-partner`: the order will be delivered by the delivery partner (Just Eat, Skip, Menulog, Takeaway).
        - `delivery-by-merchant`: delivery will be arranged by the restaurant, and not the delivery partner.
        - `collection-by-customer`: The order will be collected by the customer. Known as "take out" or "pickup" in some markets.
      type: string
      pattern: ^(delivery-by-delivery-partner|delivery-by-merchant|collection-by-customer)$
    JetConnectOrderInjectionStatusUpdaterFinalPickedItem:
      description: |-
        A menu item contained in the order.

        If an item-level promotion is applied by the delivery partner, the interested item(s) won't appear on the top level items array, but on the `promotion.items` one.
      type: object
      required:
        - name
        - description
        - plu
        - price
        - notes
      properties:
        name:
          description: Menu item name.
          type: string
        description:
          description: Menu item description.
          type: string
        plu:
          description: Menu item's Price Lookup Unit.
          type: string
        price:
          description: Menu item price indicated by an integer number in pounds and pence / dollars and cents, for example `1950` means `£19.50` or `$19.50`.
          type: number
        unitDepositAmount:
          description: The deposit paid for the item in the minor unit of the currency. For example `50` means `£0.50` or `$0.50`.
          type: number
        notes:
          description: Preparation notes that have been entered by the customer for this menu item (if any).
          type: string
        children:
          description: |-
            Array of objects representing modifier group options.

            When defining promotions of type `FREE_ITEM_MIN_BASKET`, this array should be empty.
          type: array
          items:
            $ref: "#/components/schemas/JetConnectOrderInjectionStatusUpdaterOption"
    JetConnectOrderInjectionStatusUpdaterFinalPickedItems:
      description: Array of menu items contained in the order. Except where otherwise noted, all properties are the same as provided when the menu was last published for this restaurant.
      type: array
      items:
        $ref: "#/components/schemas/JetConnectOrderInjectionStatusUpdaterFinalPickedItem"
    JetConnectOrderReportingConnectorAddress:
      title: Address
      type: object
      description: Represents a postal address, a collection of information to give the location of the restaurant.
      properties:
        lines:
          type: array
          items:
            type: string
        city:
          type: string
          minLength: 1
          description: The city/town portion of the address.
        postalCode:
          type: string
          minLength: 1
          description: Postal code of the address.
        geolocation:
          $ref: "#/components/schemas/JetConnectOrderReportingConnectorGeolocation"
      required:
        - lines
        - city
        - postalCode
        - geolocation
    JetConnectOrderReportingConnectorGeolocation:
      title: Geolocation
      description: An object that represents a latitude/longitude pair.
      type: object
      properties:
        latitude:
          type: number
          format: double
          description: The latitude in degrees.
        longitude:
          type: number
          format: double
          description: The longitude in degrees.
      required:
        - latitude
        - longitude
    JetConnectOrderReportingConnectorLocation:
      title: Location
      description: An object describing a restaurant.
      type: object
      x-examples:
        example:
          reference: "28058"
          timeZone: Europe/London
          id: "144581"
          name: McDonald's® - Lowestoft - Kirkly Rise
          address:
            lines:
              - Kirkly Rise
            city: Lowestift
            postalCode: NR33 0PP
            geolocation:
              latitude: 52.470500505289
              longitude: 1.74350275274189
          phoneNumber: "02039126648"
      properties:
        reference:
          type: string
          description: An identifier of the restaurant as given to us by a third party.
        timeZone:
          type: string
          description: The time zone the location is located in.
        id:
          type: string
          description: A unique identifier of the location in our systems.
        name:
          type: string
          description: The name of the location.
        address:
          $ref: "#/components/schemas/JetConnectOrderReportingConnectorAddress"
        phoneNumber:
          type: string
          description: The phone number of the location.
      required:
        - reference
        - id
        - name
    JetConnectOrderReportingConnectorOrder:
      title: Order
      type: object
      description: Order represents an order that was placed.
      properties:
        orderDetails:
          $ref: "#/components/schemas/JetConnectOrderReportingConnectorOrderDetails"
        pos:
          type: string
          description: The type of payment terminal, also known as a point of sale (POS) terminal.
        payload:
          type: string
          description: The payload of the single order object is an unstructured string. The purpose of this property is not to manipulate it, but just to have the possibility to quickly view the content that was injected on the POS.
        steps:
          $ref: "#/components/schemas/JetConnectOrderReportingConnectorOrderFlowSteps"
        mostRecentActivity:
          description: The most recent activity recorded for this order.
          type: string
          format: date-time
      required:
        - orderDetails
        - pos
        - payload
    JetConnectOrderReportingConnectorOrderDetails:
      title: OrderDetails
      type: object
      description: An object containing details about an order.
      properties:
        orderID:
          type: string
          minLength: 1
          description: The ID of the order.
        thirdPartyOrderReference:
          type: string
          minLength: 1
          description: The third party order reference of the order, also known as friendly order reference.
        placedAt:
          type: string
          format: date-time
          description: The date and time the order was created.
        location:
          $ref: "#/components/schemas/JetConnectOrderReportingConnectorLocation"
        status:
          $ref: "#/components/schemas/JetConnectOrderReportingConnectorOrderStatus"
        error:
          $ref: "#/components/schemas/JetConnectOrderReportingConnectorOrderError"
        sendToPosStatus:
          type: string
          description: Whether the POS injection was successful for the order, failure indicates that backup flow was triggered.
      required:
        - orderID
        - thirdPartyOrderReference
        - placedAt
        - location
        - status
        - sendToPosStatus
    JetConnectOrderReportingConnectorOrderError:
      title: OrderError
      type: object
      description: Error information, if the order failed.
      properties:
        errorCode:
          type: string
          description: The error code from the POS.
        errorMessage:
          type: string
          description: The full error message.
        errorID:
          type: string
          minLength: 1
          description: The ID of the error category.
        category:
          type: string
          minLength: 1
          description: The error category.
        resolution:
          type: string
          description: A possible resolution to the error.
        errorName:
          type: string
          description: The name of the matched error category.
        level:
          type: string
          description: The level, either brand or integration.
        matchedRegex:
          type: string
          description: The regular expression that was matched to the error message.
      required:
        - errorCode
        - errorMessage
        - errorID
        - category
        - resolution
        - errorName
        - level
        - matchedRegex
    JetConnectOrderReportingConnectorOrderFlowStep:
      title: OrderFlowStep
      type: object
      description: A specific step in the order flow.
      properties:
        name:
          type: string
          description: The name of the step.
        description:
          type: string
          description: A description of the step.
        service:
          type: string
          description: The service that emitted the event.
        time:
          type: string
          format: date-time
          description: The time when the event occurred.
      required:
        - name
        - description
        - service
        - time
    JetConnectOrderReportingConnectorOrderFlowSteps:
      title: OrderFlowSteps
      type: array
      items:
        $ref: "#/components/schemas/JetConnectOrderReportingConnectorOrderFlowStep"
    JetConnectOrderReportingConnectorOrderStatus:
      title: OrderStatus
      type: string
      description: The current status of an order. If an order is "success" the error property will be empty.
      enum:
        - success
        - failure
    JetConnectOrderingUniversalConnectorAddedItem:
      type: object
      description: AddedItem represents an alternative product that can replace a product that was out of stock.
      required:
        - plu
        - quantity
      properties:
        plu:
          type: string
          description: The partner specific identifier or "price lookup code" for the substituted item.
          example: plu123
        quantity:
          type: number
          description: The number of products, identified by this price lookup code, that are to be added to the order and will replace the removed items.
          example: 2
    JetConnectOrderingUniversalConnectorAddress:
      type: object
      description: Information about an address
      properties:
        lines:
          type: array
          description: The address lines
          items:
            type: string
        city:
          type: string
          description: The city
        postalCode:
          type: string
          description: The postcode
        geoLocation:
          $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorGeolocation"
        county:
          type: string
          description: The county
        companyName:
          type: string
          description: The name of the company
      required:
        - lines
        - city
        - postalCode
        - county
    JetConnectOrderingUniversalConnectorAdjustmentItem:
      type: object
      description: Information about an adjustment
      properties:
        value:
          type: number
          format: double
          description: The amount of the adjustment
        tax:
          type: number
          format: double
          description: The tax adjustment
      required:
        - value
        - tax
    JetConnectOrderingUniversalConnectorAdjustments:
      type: object
      description: Adjustments to the order
      properties:
        delivery:
          $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorAdjustmentItem"
        serviceCharge:
          $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorAdjustmentItem"
        other:
          $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorAdjustmentItem"
        driverTip:
          $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorAdjustmentItem"
        bagFee:
          $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorAdjustmentItem"
    JetConnectOrderingUniversalConnectorAmendOrderItem:
      type: object
      description: Item to be amended.
      required:
        - reason
        - plu
        - missingQuantity
      properties:
        reason:
          type: string
          enum:
            - missing
          description: The reason the item is being amended.
        plu:
          type: string
          description: The partner specific identifier or "price lookup code" for the missing item.
          example: plu123
        missingQuantity:
          type: number
          description: The amount of items this amendment affects.
          example: 1
    JetConnectOrderingUniversalConnectorAmendOrderReq:
      type: object
      description: Items marked as out of stock.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorAmendOrderItem"
    JetConnectOrderingUniversalConnectorAmendOrderResp:
      type: object
      description: Information about this amendment.
