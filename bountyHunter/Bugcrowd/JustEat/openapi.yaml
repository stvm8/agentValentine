        deliveryStep:
          description: The step until which the delivery should be simulated. This is an optional field. If not provided, the delivery will be simulated until the DELIVERED step. If a delivery is simulated for any step before DELIVERED, it can be simulated again for any subsequent step; the simulation will then resume from the point where the previous simulation for that request ended.
