    post:
      tags:
        - JET Connect for Dispatch Orders
        - jet-connect
        - publicly-accessible
      summary: Indicate out of stock and substituted items in an order
      description: |
        Allows a partner to mark items that were out of stock and, optionally, to offer substituted items in their place.

        The following constraints apply to substitutions:
        - The substituted item must be of equal or lower cost than the removed item. Substitutions where the added item price exceeds the removed item price will be rejected.
        - Substitutions must be one-to-one per modification pair: one removed item (by PLU) can only be replaced by one added item (by PLU). For example, replacing 2 x 500ml milk with 1 x 1L milk is not supported, and vice versa (replacing 1 x 1L milk with 2 x 500ml milk is also not supported).
      operationId: ordersOrderIdModificationPost
      security:
        - X-Flyt-Api-Key: []
      callbacks:
        modificationCallback:
          /your-modification-notification-endpoint:
            post:
              summary: Notification of modification request processing
              description: |
                Sent when the platform has processed a modification request, whether successful or failed.

                Partners can configure path or URLs for success notifications. Please contact your brand manager to have this configured.

                Note: Information about the state of an order after modification can also be obtained via Final Picked Order - see [Final Injection Documentation](https://uk.api.just-eat.io/docs#operation/finalFinalPickedOrderPost) for details.
              responses:
                "202":
                  description: Your server implementation should return this HTTP status code if the data was received successfully
              requestBody:
                content:
                  application/json:
                    schema:
                      type: object
                      oneOf:
                        - $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorSuccessModificationBody"
                        - $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorFailedModificationBody"
      parameters:
        - name: orderId
          in: path
          required: true
          description: The originating order ID as supplied by the ordering partner.
          example: 00025doahk2txeo9ttd0ma
          schema:
            type: string
        - name: x-jet-application
          in: header
          schema:
            type: string
          required: false
          description: Descriptor of client or internal application
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorModifyOrderReq"
            examples:
              Single out of stock item:
                value:
                  modifications:
                    - removedItems:
                        - plu: plu123
                          missingQuantity: 1
              An item out of stock has been substituted with one item:
                value:
                  modifications:
                    - removedItems:
                        - plu: plu123
                          missingQuantity: 1
                      addedItems:
                        - plu: plu321
                          quantity: 1
      responses:
        "202":
          description: The modification request has been accepted and will be processed.
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorFailedModificationBodySync"
