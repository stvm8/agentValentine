        - errors
      properties:
        orderId:
          type: string
          description: Partner order ID, as provided upon initial injection
          example: 00025doahk2txeo9ttd0ma
        errors:
          type: array
          items:
            $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorFailedModificationReasonSync"
        type:
          type: string
          description: Indicates if the callback is for a modification failure.
          enum:
            - failure
    JetConnectOrderingUniversalConnectorFailedModificationReason:
      type: object
      required:
        - errorCode
      properties:
        errorCode:
          type: string
          description: The reason a modification request did not succeed. This list could be expanded in the future. Your application should be tolerant to new, unexpected values.
          enum:
            - badRequestFormat
            - orderNotFound
            - removedItemNotFound
            - removedItemDuplicate
            - removedItemSubstitutionNotEnabled
            - addedItemNotFound
            - addedPriceIsGreaterThanRemoved
            - newTotalPriceLessThanOrEqualToZero
            - notSupported
            - cancelOrderNotAllowed
            - upstreamPartner
            - other
        removed:
          type: object
          description: Supplied when errorCode is removedItemNotFound, removedItemDuplicate and removedItemSubstitutionNotEnabled.
          $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorModificationRemovedItem"
        added:
          type: object
          description: Supplied when errorCode is addedItemNotFound.
          $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorAddedItem"
        pricing:
          type: object
          description: Detailed information when rejection happened due to pricing. Supplied when errorCode is addedPriceIsGreaterThanRemoved.
          properties:
            modificationPair:
              type: object
              $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorModificationPair"
            currency:
              type: string
              description: The currency of the items on the menu in ISO 4217 format, i.e. GBP, EUR, AUD or NZD
            priceDifference:
              type: number
              format: integer
              description: Price difference in the minor unit of the currency
        notSupportedModificationPair:
          description: Supplied when the errorCode is notSupported. Indicates the unsupported modification pair.
          $ref: "#/components/schemas/JetConnectOrderingUniversalConnectorModificationPair"
        notSupportedReasons:
          type: array
          description: Supplied when errorCode is notSupported. Shows what modification pair type was not supported. This list could be expanded in the future. Your application should be tolerant to new, unexpected values.
          items:
            type: string
            enum:
              - oneToManySubstitution
              - manyToOneSubstitution
              - manyToManySubstitution
              - removedComplexItemInSubstitution
              - removedMealDealInSubstitution
              - addedMealDealInSubstitution
              - other
      example:
        errorCode: addedPriceIsGreaterThanRemoved
        pricing:
          modificationPair:
            removedItems:
              - plu: plu-123
                missingQuantity: 1
            addedItems:
              - plu: plu-456
                quantity: 2
          priceDifference: 7500
          currency: GBP
    JetConnectOrderingUniversalConnectorFailedModificationReasonSync:
      type: object
      required:
        - errorCode
      properties:
        errorCode:
          type: string
          description: The reason a modification request did not succeed. This list could be expanded in the future. Your application should be tolerant to new, unexpected values.
          enum:
            - badRequestFormat
            - removedItemNotFound
            - removedItemSubstitutionNotEnabled
            - addedItemNotFound
            - invalidModificationRequest
            - emptyRequest
            - finalOrderAlreadyInjected
            - internalServerError
      example:
        errorCode: removedItemNotFound
