  /order/{id}/sent-to-pos-failed:
    post:
      tags:
        - JET Connect for Dispatch Orders
        - jet-connect
        - publicly-accessible
      summary: Update JET Connect with the unsuccessful result of an async order
      description: |-
        Marks the order status of a pending order as failed to inject. 
        This does not mean that the order is rejected, as the order will go through the backup flow, if any.

        Orders are marked pending when you respond to a call to the Receive Order endpoint with a 202 status.

        Requests to this endpoint for an order which is no longer pending will fail.

        If this endpoint is not called within 3 minutes after an order is marked as pending, the order status will switch to "failed to inject".
        If you are receiving multiple transmissions for the same order, e.g. Initial and Final Picked Order, then you need to provide the Transmission ID from the order payload in the request body.
      operationId: SentToPosFailed
      security:
        - X-Flyt-Api-Key: []
      parameters:
        - name: id
          in: path
          description: The identifier for the order for which the status should be updated. Note that this is the JET Connect order ID, received as id in the Receive Order endpoint body.
          required: true
          example: xsfkfwtowkm1mswn2gmjjq
          schema:
            type: string
        - name: Content-Type
          in: header
          description: Specifies the content type of your request. Should always be set to application/json.
          schema:
            type: string
            pattern: ^application\/json$
        - name: x-jet-application
          in: header
          schema:
            type: string
          required: false
          description: Descriptor of client or internal application
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JetConnectOrderInjectionStatusUpdaterAsyncOrderFailed"
            examples:
              example:
                value:
                  happenedAt: 2019-04-03T00:56:24+00:00
                  errorCode: MENU_ERROR
                  errorMessage: Items out of stock
      responses:
        "204":
          description: The order was found and its status was updated. The delivery partner will be notified of the order status.
        "400":
          description: Any non-2xx status codes will be taken as a failure and redirected to the tablet to be hand-keyed into your POS.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JetConnectOrderInjectionStatusUpdaterFailureResponse"
        "429":
          description: "Too Many Requests : Request not completed as server has received too many requests in a given amount of time."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4XxErrorSchema"
              example:
                fault:
                  traceId: 0HLOCKDKQPKIU
                  faultId: 72d7036d-990a-4f84-9efa-ef5f40f6044b
                  errors:
                    - description: Couldn't complete request
      servers:
        - url: https://order-injection-status-updater.flyt-platform.com
          description: Production environment
      x-component-name: orderinjectionstatusupdater
      x-status: Stable
      x-webhook: Yes
